---
layout: default
---
<style>
  .post-wrap { max-width: 740px; margin: 0 auto; }
  .post-crumb { font-size: 0.8rem; color: #6c757d; margin-bottom: 1.25rem; }
  .post-crumb a { color: #6c757d; text-decoration: none; }
  .post-crumb a:hover { color: #0d6efd; }
  .post-meta { font-size: 0.85rem; color: #6c757d; margin-bottom: 0.6rem; display: flex; align-items: center; gap: 0.6rem; flex-wrap: wrap; }
  .post-title { font-size: 2.1rem; font-weight: 800; color: #1a1a2e; line-height: 1.2; margin: 0 0 0.75rem; }
  .post-tags { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-bottom: 2rem; }
  .post-tag { display: inline-block; padding: 0.2em 0.7em; background: #eef2f7; color: #4a5568; border-radius: 999px; font-size: 0.78rem; font-weight: 500; }
  .post-body { font-size: 1.06rem; line-height: 1.75; color: #2b2b3a; }
  .post-body h2 { font-size: 1.45rem; font-weight: 700; color: #1a1a2e; margin: 2rem 0 0.75rem; }
  .post-body h3 { font-size: 1.2rem; font-weight: 700; color: #1a1a2e; margin: 1.6rem 0 0.5rem; }
  .post-body p { margin-bottom: 1.2rem; }
  .post-body blockquote { border-left: 4px solid #0d6efd; padding: 0.75rem 1.25rem; margin: 1.5rem 0; background: #f8f9fb; border-radius: 0 8px 8px 0; color: #4a5568; }
  .post-body ul, .post-body ol { margin-bottom: 1.2rem; padding-left: 1.4rem; }
  .post-body li { margin-bottom: 0.4rem; }
  .post-body code { background: #f1f3f5; padding: 0.12em 0.4em; border-radius: 4px; font-size: 0.9em; }
  .post-foot { margin-top: 3rem; padding-top: 1.5rem; border-top: 1px solid #e3e7ee; font-size: 0.92rem; }
</style>

<article class="post-wrap">
  <div class="post-crumb"><a href="/blog/">Blog</a> › {{ page.title }}</div>
  <h1 class="post-title">{{ page.title }}</h1>
  <div class="post-meta">
    <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%B %-d, %Y" }}</time>
    {% if page.author %}<span>·</span><span>{{ page.author }}</span>{% endif %}
  </div>
  {% if page.tags.size > 0 %}
  <div class="post-tags">{% for t in page.tags %}<span class="post-tag">{{ t }}</span>{% endfor %}</div>
  {% endif %}

  <div class="post-body">
    {{ content }}
  </div>

  <div class="post-foot">
    <a href="/blog/">← All posts</a> · <a href="/start/">Try Spotlight</a>
  </div>
</article>
